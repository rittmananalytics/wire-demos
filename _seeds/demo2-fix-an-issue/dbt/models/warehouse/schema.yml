version: 2

# NOTE FOR THE DEMO: this schema.yml is deliberately incomplete.
# fct_orders is documented with only its primary key and no tests on
# its foreign key. Wire's dbt-validate flags this as a critical issue:
# every fact-table FK must have a relationships test against the
# referenced dimension's PK (per Wire's dbt-development conventions).
# The fix step adds the missing column documentation and tests.

models:
  - name: dim_customer
    description: "Customer dimension with lifetime aggregates"
    columns:
      - name: customer_pk
        description: "Primary key — surrogate customer identifier"
        tests:
          - unique
          - not_null
      - name: email
        description: "Customer email address"
      - name: lifetime_orders
        description: "Count of orders placed by this customer"
        tests:
          - not_null
      - name: lifetime_revenue
        description: "Sum of order total_price for this customer"

  - name: fct_orders
    description: "Order fact table — one row per Shopify order, attributed to a customer"
    columns:
      - name: order_pk
        description: "Primary key — Shopify order ID"
        tests:
          - unique
          - not_null
      # ↓ INCOMPLETE — customer_fk is the foreign key to dim_customer but
      #   it's not documented here, and there's no relationships test
      #   against dim_customer.customer_pk. Wire's dbt-validate will flag
      #   this. Demo step 6 adds the missing entries.
