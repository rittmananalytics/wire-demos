name: peak_retail
version: '1.0.0'
config-version: 2

profile: duckdb_demo

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  peak_retail:
    staging:
      +materialized: view
      shopify:
        +tags: ["staging", "shopify"]
      netsuite:
        +tags: ["staging", "netsuite"]
      klaviyo:
        +tags: ["staging", "klaviyo"]
      ga4:
        +tags: ["staging", "ga4"]
    integration:
      +materialized: view
      +tags: ["integration"]
    warehouse:
      +materialized: table
      +tags: ["warehouse"]

seeds:
  peak_retail:
    +schema: seeds

vars:
  attribution_click_window_days: 7
  attribution_open_window_days: 1
