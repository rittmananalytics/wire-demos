version: 2

sources:
  - name: shopify
    description: "Shopify source data (loaded from CSV seeds for the demo)"
    schema: main
    tables:
      - name: shopify_customers
        identifier: shopify_customers
        description: "Shopify customer records"
        columns:
          - name: id
            description: "Shopify customer ID"
            tests:
              - unique
              - not_null
          - name: email
            description: "Customer email"
      - name: shopify_orders
        identifier: shopify_orders
        description: "Shopify order header records"
        columns:
          - name: id
            description: "Shopify order ID"
            tests:
              - unique
              - not_null
          - name: customer_id
            description: "FK to shopify_customers.id (raw source name; renamed downstream)"
